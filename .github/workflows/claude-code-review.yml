name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    if: >
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          include_fix_links: false
          allowed_bots: "claude[bot],codex[bot],github-actions[bot]"
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the autonomous reviewer agent for this pull request. You are
            independent from the authoring agent that created the PR.

            Review the PR thoroughly. This is not a style-only pass. Assess the
            architecture, implementation approach, tests, documentation, and whether the
            feature or approach aligns with Volt's project goals.

            Before reviewing, read `REVIEW.md` and follow it as the review rubric. Also
            read `AGENTS.md` and `CONTRIBUTING.md` for project context. If these files
            disagree, `REVIEW.md` controls review behavior.

            Inspect the PR diff and surrounding code as needed. Prefer file and line
            evidence for every Important finding. Do not report issues that CI already
            covers unless they reveal a deeper architecture or correctness problem.

            Do not edit files, create commits, push branches, approve the PR, or merge
            anything. Your only job is to post review feedback.

            Use inline comments for specific code findings:
            `mcp__github_inline_comment__create_inline_comment` with `confirmed: true`.
            Use `gh pr comment` for the top-level summary.

            If there are no blocking issues, post a concise summary that starts with
            `No blocking issues found.` If there are blocking issues, start with
            `Blocking issues found: N.`
          claude_args: |
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*)"
