name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test-docs:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install tools on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build doxygen clang-format

      - name: Install tools on macOS
        if: runner.os == 'macOS'
        run: brew install ninja clang-format

      - name: Verify tools on Windows
        if: runner.os == 'Windows'
        run: |
          ninja --version
          clang-format --version

      - name: Install Python dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check formatting
        run: python scripts/check-format.py

      - name: Check build configuration
        run: python scripts/check-build-config.py

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

      - name: Build docs
        if: runner.os == 'Linux'
        run: cmake --build --preset dev --target docs

  coverage:
    name: coverage
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build lcov

      - name: Generate coverage report
        run: cmake --workflow --preset coverage

      - name: Enforce line coverage threshold
        run: |
          lcov \
            --summary build/coverage/coverage/volt-coverage.info \
            --fail-under-lines 80 \
            --ignore-errors inconsistent,inconsistent,unsupported
