<svg xmlns="http://www.w3.org/2000/svg" class="pcb-placement-preview" viewBox="0 0 58 38" width="58mm" height="38mm" data-board="board:0" data-board-name="Control" data-units="mm">
  <style>
    .board-background{fill:#f8faf8}
    .board-outline{fill:#d7ead0;stroke:#1f5f3a;stroke-width:0.28}
    .board-feature{fill:none;stroke:#6b7280;stroke-width:0.24}
    .board-feature-label,.reference-designator,.pad-net-label,.diagnostic-label{font:1.8px sans-serif;fill:#172026}
    .footprint-body{fill:#fff8db;stroke:#8a6a16;stroke-width:0.18}
    .footprint-pad{fill:#d99822;stroke:#5a3a08;stroke-width:0.14}
    .pad-overlay{fill:#175cd3;stroke:#ffffff;stroke-width:0.12}
    .ratsnest{fill:none;stroke:#175cd3;stroke-width:0.16;stroke-dasharray:0.8 0.55}
    .diagnostic-marker{fill:none;stroke:#b42318;stroke-width:0.28;stroke-dasharray:0.9 0.55}
    .diagnostic-label{fill:#b42318}
  </style>
  <rect class="board-background" x="0" y="0" width="58" height="38"/>
  <g class="board-content" transform="translate(4 4)">
    <polygon class="board-outline" data-board="board:0" points="0,0 50,0 50,30 0,30"/>
    <g class="layer layer-board-features">
      <circle class="board-feature hole" data-board-feature="board_feature:0" cx="3" cy="3" r="1.6"/>
      <text class="board-feature-label" data-board-feature="board_feature:0" x="3" y="6.6" text-anchor="middle">MH1</text>
    </g>
    <g class="layer layer-footprints">
      <g class="component-placement top locked" data-placement="component_placement:0" data-component="component:0" data-footprint-def="footprint_def:0" data-footprint="passives:R_0603_1608Metric" transform="translate(25 15) rotate(90)">
        <rect class="footprint-body" x="-1.65" y="-0.975" width="3.3" height="1.95"/>
        <rect class="footprint-pad rounded-rectangle connected" data-pad-projection="pcb_pad:0:0" data-pad="footprint_pad:0" data-pin="pin:0" data-net="net:0" x="-1.15" y="-0.475" width="0.8" height="0.95" rx="0.1" ry="0.1"/>
        <rect class="footprint-pad rounded-rectangle connected" data-pad-projection="pcb_pad:0:1" data-pad="footprint_pad:1" data-pin="pin:1" data-net="net:1" x="0.35" y="-0.475" width="0.8" height="0.95" rx="0.1" ry="0.1"/>
        <text class="reference-designator" data-component="component:0" x="0" y="-1.975" text-anchor="middle">R1</text>
      </g>
    </g>
    <g class="layer layer-ratsnest">
    </g>
    <g class="layer layer-pad-overlays">
      <circle class="pad-overlay connected" data-pad-projection="pcb_pad:0:0" data-net="net:0" cx="25" cy="14.25" r="0.35"/>
      <text class="pad-net-label connected" data-pad-projection="pcb_pad:0:0" data-net="net:0" x="25.7" y="13.8">LEFT</text>
      <circle class="pad-overlay connected" data-pad-projection="pcb_pad:0:1" data-net="net:1" cx="25" cy="15.75" r="0.35"/>
      <text class="pad-net-label connected" data-pad-projection="pcb_pad:0:1" data-net="net:1" x="25.7" y="15.3">RIGHT</text>
    </g>
    <g class="layer layer-diagnostics">
    </g>
  </g>
</svg>
