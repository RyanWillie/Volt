<svg xmlns="http://www.w3.org/2000/svg" class="pcb-placement-preview" viewBox="0 0 40 26" width="40mm" height="26mm" data-board="board:0" data-board-name="First Board LED" data-units="mm">
  <style>
    .board-background{fill:#f8faf8}
    .board-outline{fill:#d7ead0;stroke:#1f5f3a;stroke-width:0.28}
    .board-feature{fill:none;stroke:#6b7280;stroke-width:0.24}
    .board-feature-label,.reference-designator,.pad-net-label,.diagnostic-label{font:1.8px sans-serif;fill:#172026}
    .footprint-body{fill:#fff8db;stroke:#8a6a16;stroke-width:0.18}
    .footprint-pad{fill:#d99822;stroke:#5a3a08;stroke-width:0.14}
    .pad-overlay{fill:#175cd3;stroke:#ffffff;stroke-width:0.12}
    .ratsnest{fill:none;stroke:#175cd3;stroke-width:0.16;stroke-dasharray:0.8 0.55}
    .diagnostic-marker{fill:none;stroke:#b42318;stroke-width:0.28;stroke-dasharray:0.9 0.55}
    .diagnostic-label{fill:#b42318}
  </style>
  <rect class="board-background" x="0" y="0" width="40" height="26"/>
  <g class="board-content" transform="translate(4 4)">
    <polygon class="board-outline" data-board="board:0" points="0,0 32,0 32,18 0,18"/>
    <g class="layer layer-board-features">
      <circle class="board-feature mounting-hole" data-board-feature="board_feature:0" cx="3" cy="3" r="1.35"/>
      <text class="board-feature-label" data-board-feature="board_feature:0" x="3" y="6.35" text-anchor="middle">MH1</text>
      <circle class="board-feature mounting-hole" data-board-feature="board_feature:1" cx="29" cy="15" r="1.35"/>
      <text class="board-feature-label" data-board-feature="board_feature:1" x="29" y="18.35" text-anchor="middle">MH2</text>
    </g>
    <g class="layer layer-footprints">
      <g class="component-placement top locked" data-placement="component_placement:0" data-component="component:0" data-footprint="connectors:PinHeader_1x02_P2.54mm_Vertical" transform="translate(5 9) rotate(0)">
        <rect class="footprint-body" x="-1.35" y="-2.62" width="2.7" height="5.24"/>
        <circle class="footprint-pad circle connected" data-pad-projection="pcb_pad:0:0" data-pad="footprint_pad:0" data-pin="pin:0" data-net="net:0" cx="0" cy="-1.27" r="0.85"/>
        <circle class="footprint-pad circle connected" data-pad-projection="pcb_pad:0:1" data-pad="footprint_pad:1" data-pin="pin:1" data-net="net:2" cx="0" cy="1.27" r="0.85"/>
        <text class="reference-designator" data-component="component:0" x="0" y="-3.62" text-anchor="middle">J1</text>
      </g>
      <g class="component-placement top" data-placement="component_placement:1" data-component="component:1" data-footprint="passives:R_0603_1608Metric" transform="translate(15 7) rotate(0)">
        <rect class="footprint-body" x="-1.65" y="-0.975" width="3.3" height="1.95"/>
        <rect class="footprint-pad rounded-rectangle connected" data-pad-projection="pcb_pad:1:0" data-pad="footprint_pad:0" data-pin="pin:2" data-net="net:0" x="-1.15" y="-0.475" width="0.8" height="0.95" rx="0.1" ry="0.1"/>
        <rect class="footprint-pad rounded-rectangle connected" data-pad-projection="pcb_pad:1:1" data-pad="footprint_pad:1" data-pin="pin:3" data-net="net:1" x="0.35" y="-0.475" width="0.8" height="0.95" rx="0.1" ry="0.1"/>
        <text class="reference-designator" data-component="component:1" x="0" y="-1.975" text-anchor="middle">R1</text>
      </g>
      <g class="component-placement top" data-placement="component_placement:2" data-component="component:2" data-footprint="leds:LED_0603_1608Metric" transform="translate(24 7) rotate(180)">
        <rect class="footprint-body" x="-1.65" y="-0.975" width="3.3" height="1.95"/>
        <rect class="footprint-pad rounded-rectangle connected" data-pad-projection="pcb_pad:2:0" data-pad="footprint_pad:0" data-pin="pin:4" data-net="net:1" x="-1.15" y="-0.475" width="0.8" height="0.95" rx="0.1" ry="0.1"/>
        <rect class="footprint-pad rounded-rectangle connected" data-pad-projection="pcb_pad:2:1" data-pad="footprint_pad:1" data-pin="pin:5" data-net="net:2" x="0.35" y="-0.475" width="0.8" height="0.95" rx="0.1" ry="0.1"/>
        <text class="reference-designator" data-component="component:2" x="0" y="-1.975" text-anchor="middle">D1</text>
      </g>
    </g>
    <g class="layer layer-pad-overlays">
      <circle class="pad-overlay connected" data-pad-projection="pcb_pad:0:0" data-net="net:0" cx="5" cy="7.73" r="0.35"/>
      <text class="pad-net-label connected" data-pad-projection="pcb_pad:0:0" data-net="net:0" x="5.7" y="7.28">+3V3</text>
      <circle class="pad-overlay connected" data-pad-projection="pcb_pad:0:1" data-net="net:2" cx="5" cy="10.27" r="0.35"/>
      <text class="pad-net-label connected" data-pad-projection="pcb_pad:0:1" data-net="net:2" x="5.7" y="9.82">GND</text>
      <circle class="pad-overlay connected" data-pad-projection="pcb_pad:1:0" data-net="net:0" cx="14.25" cy="7" r="0.35"/>
      <text class="pad-net-label connected" data-pad-projection="pcb_pad:1:0" data-net="net:0" x="14.95" y="6.55">+3V3</text>
      <circle class="pad-overlay connected" data-pad-projection="pcb_pad:1:1" data-net="net:1" cx="15.75" cy="7" r="0.35"/>
      <text class="pad-net-label connected" data-pad-projection="pcb_pad:1:1" data-net="net:1" x="16.45" y="6.55">LED_A</text>
      <circle class="pad-overlay connected" data-pad-projection="pcb_pad:2:0" data-net="net:1" cx="24.75" cy="7" r="0.35"/>
      <text class="pad-net-label connected" data-pad-projection="pcb_pad:2:0" data-net="net:1" x="25.45" y="6.55">LED_A</text>
      <circle class="pad-overlay connected" data-pad-projection="pcb_pad:2:1" data-net="net:2" cx="23.25" cy="7" r="0.35"/>
      <text class="pad-net-label connected" data-pad-projection="pcb_pad:2:1" data-net="net:2" x="23.95" y="6.55">GND</text>
    </g>
    <g class="layer layer-ratsnest">
    </g>
    <g class="layer layer-diagnostics">
    </g>
  </g>
</svg>
